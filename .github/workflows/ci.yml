name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ERT (Emacs ${{ matrix.emacs_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version: ['29.1', '29.4', 'snapshot']
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}
      - name: Show Emacs version
        run: emacs --version
      - name: Byte-compile
        run: |
          # pharo-smalltalk-pkg.el is the package descriptor (no
          # lexical-binding cookie by convention); skip it.
          shopt -s extglob
          emacs --batch -Q -L . \
            --eval "(setq byte-compile-error-on-warn t)" \
            -f batch-byte-compile pharo-smalltalk!(*-pkg).el
      - name: Run ERT batch
        run: |
          emacs --batch -Q -L . \
            -l pharo-smalltalk.el \
            -l pharo-smalltalk-xref.el \
            -l pharo-smalltalk-capf.el \
            -l pharo-smalltalk-test.el \
            -l pharo-smalltalk-ert.el \
            -f ert-run-tests-batch-and-exit

  lint:
    name: package-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: '29.4'
      - name: Install package-lint
        run: |
          emacs --batch -Q --eval "(progn \
            (require 'package) \
            (add-to-list 'package-archives \
              '(\"melpa\" . \"https://melpa.org/packages/\")) \
            (package-initialize) \
            (package-refresh-contents) \
            (package-install 'package-lint))"
      - name: Lint main package file
        run: |
          emacs --batch -Q -L . \
            --eval "(let ((default-directory (expand-file-name \"~/.emacs.d/elpa/\"))) \
                     (normal-top-level-add-subdirs-to-load-path))" \
            -l package-lint \
            -f package-lint-batch-and-exit \
            pharo-smalltalk.el
